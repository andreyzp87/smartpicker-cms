services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: smartpicker
      POSTGRES_USER: smartpicker
      POSTGRES_PASSWORD: development
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
